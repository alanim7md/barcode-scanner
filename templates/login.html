<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Login - The Golden Mile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --primary-glow: rgba(56, 189, 248, 0.35);
            --bg-dark: #090d16;
            --card-bg: rgba(30, 41, 59, 0.45);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error-bg: rgba(239, 68, 68, 0.12);
            --error-border: rgba(239, 68, 68, 0.3);
            --error-text: #fca5a5;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 50%, #090d16 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* Ambient floating glowing orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        .orb-1 {
            width: 350px;
            height: 350px;
            background: rgba(56, 189, 248, 0.25);
            top: 15%;
            left: 15%;
            animation: float-1 20s infinite alternate ease-in-out;
        }

        .orb-2 {
            width: 450px;
            height: 450px;
            background: rgba(129, 140, 248, 0.2);
            bottom: 10%;
            right: 15%;
            animation: float-2 25s infinite alternate ease-in-out;
        }

        @keyframes float-1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.15); }
        }

        @keyframes float-2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-80px, -50px) scale(0.9); }
        }

        /* Mesh background grid lines for that premium tech feel */
        .mesh-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        .login-container {
            background: var(--card-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 55px 45px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 
                0 30px 60px -15px rgba(0, 0, 0, 0.65), 
                inset 0 1px 0 rgba(255, 255, 255, 0.15),
                0 0 100px -20px rgba(56, 189, 248, 0.1);
            z-index: 1;
            transform: translateY(30px);
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            box-sizing: border-box;
        }

        @keyframes fadeUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 35px auto;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .logo-container:hover {
            transform: scale(1.08) rotate(4deg);
        }

        .logo-container::after {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            border: 2px dashed rgba(56, 189, 248, 0.4);
            animation: rotate-dashed 20s linear infinite;
        }

        @keyframes rotate-dashed {
            to { transform: rotate(360deg); }
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.5), 
                0 0 25px rgba(56, 189, 248, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 8px 0;
            font-weight: 700;
            font-size: 28px;
            letter-spacing: -0.8px;
            background: linear-gradient(135deg, #ffffff 30%, #a5f3fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            margin: 0 0 35px 0;
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 400;
            letter-spacing: -0.2px;
        }

        .input-group {
            position: relative;
            margin-bottom: 22px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(10, 15, 26, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px 24px;
            border-radius: 16px;
            color: var(--text-main);
            font-size: 15px;
            font-family: 'Outfit', 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 
                0 0 0 4px var(--primary-glow), 
                inset 0 2px 4px rgba(0, 0, 0, 0.3),
                0 4px 15px rgba(56, 189, 248, 0.15);
            background: rgba(10, 15, 26, 0.8);
            transform: translateY(-2px);
        }

        input::placeholder {
            color: #4b5563;
        }

        button {
            width: 100%;
            padding: 18px;
            margin-top: 10px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, #0284c7 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 25px -10px rgba(2, 132, 199, 0.7);
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transform: skewX(-25deg);
            transition: 0.75s;
        }

        button:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 18px 30px -10px rgba(2, 132, 199, 0.85),
                0 0 20px rgba(56, 189, 248, 0.2);
        }

        button:hover::after {
            left: 150%;
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 5px 15px -10px rgba(2, 132, 199, 0.8);
        }

        .error-message {
            color: var(--error-text);
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 14px;
            margin-bottom: 25px;
            text-align: center;
            display: none;
            animation: shake 0.6s cubic-bezier(.36, .07, .19, .97) both;
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.05);
            font-weight: 500;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Support for Flask flash messages or template variables if used in future */
        {% if error %}
        .error-message {
            display: block;
        }
        {% endif %}
    </style>
</head>

<body>
    <!-- Ambient layout elements -->
    <div class="mesh-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-container">
        <div class="logo-container">
            <img src="/static/logo2.jpeg" alt="The Golden Mile Logo" class="logo">
        </div>

        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to The Golden Mile Scanner</p>

        <div class="error-message" id="errorMsg">Invalid username or password. Please try again.</div>

        <form method="POST" id="loginForm">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required autofocus autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>

    <script>
        // A simple script to show the error message if the URL contains ?error=1
        if (window.location.search.includes('error=1')) {
            document.getElementById('errorMsg').style.display = 'block';
        }
    </script>
</body>

</html>
