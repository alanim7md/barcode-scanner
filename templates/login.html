<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Login - The Golden Mile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
            overflow: hidden;
        }

        /* Ambient background glow */
        .background-glow {
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(15, 23, 42, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        .login-container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 1;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }
        
        .logo-container:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 20px rgba(56, 189, 248, 0.2);
            border: 2px solid rgba(56, 189, 248, 0.4);
        }

        h2 {
            margin: 0 0 10px 0;
            font-weight: 700;
            font-size: 26px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            margin: 0 0 35px 0;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 400;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 20px;
            border-radius: 12px;
            color: #f8fafc;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15), inset 0 2px 4px rgba(0,0,0,0.2);
            background: rgba(15, 23, 42, 0.7);
            transform: translateY(-2px);
        }

        input::placeholder {
            color: #64748b;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 20px -10px rgba(2, 132, 199, 0.6);
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -10px rgba(2, 132, 199, 0.8);
        }

        button:hover::after {
            left: 150%;
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 5px 15px -10px rgba(2, 132, 199, 0.8);
        }

        .error-message {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 25px;
            text-align: center;
            display: none;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Support for Flask flash messages or template variables if used in future */
        {% if error %}
            .error-message { display: block; }
        {% endif %}

    </style>
</head>
<body>
    <div class="background-glow"></div>
    <div class="login-container">
        
        <div class="logo-container">
            <img src="/static/logo.png" alt="The Golden Mile Logo" class="logo">
        </div>
        
        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to The Golden Mile Scanner</p>
        
        <!-- Assuming the backend might pass 'error=True' on failure -->
        <div class="error-message" id="errorMsg">Invalid username or password. Please try again.</div>

        <form method="POST" id="loginForm">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required autofocus autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>

    <script>
        // A simple script to show the error message if the URL contains ?error=1
        if (window.location.search.includes('error=1')) {
            document.getElementById('errorMsg').style.display = 'block';
        }
    </script>
</body>
</html>
